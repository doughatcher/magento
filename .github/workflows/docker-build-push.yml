name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - '.devcontainer/Dockerfile-magento'
      - '.devcontainer/Dockerfile-nginx'
      - '.devcontainer/conf/**'
  pull_request:
    branches:
      - main
    paths:
      - '.devcontainer/Dockerfile-magento'
      - '.devcontainer/Dockerfile-nginx'
      - '.devcontainer/conf/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NODE_VERSION: --lts
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: magento
            dockerfile: .devcontainer/Dockerfile-magento
            context: .devcontainer
            image_suffix: ""
          - name: nginx
            dockerfile: .devcontainer/Dockerfile-nginx
            context: .devcontainer
            image_suffix: "-nginx"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image.image_suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image URL
        run: |
          echo "Image pushed to: ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image.image_suffix }}:${{ github.sha }}"
