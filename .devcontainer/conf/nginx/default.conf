upstream fastcgi_backend {
   server  127.0.0.1:9000;
}

server {
    listen 80;
    server_name localhost;

    set $MAGE_ROOT /var/www/html;
    set $MAGE_DEBUG_SHOW_ARGS 0;

    include /var/www/html/.devcontainer/conf/nginx/magento.conf;
}

server {
    # HTTP/2 matters for the admin panel, which issues 100+ sub-requests per
    # page. HTTP/1.1 serializes those over a handful of connections; HTTP/2
    # multiplexes them on one. Noticeable difference on admin page loads.
    listen 8443 ssl http2;

    set $MAGE_ROOT /var/www/html;
    set $MAGE_DEBUG_SHOW_ARGS 0;

    server_name  localhost;

    ssl_certificate     /etc/ssl/certs/localhost.crt;
    ssl_certificate_key /etc/ssl/private/localhost.key;
    # TLSv1 / TLSv1.1 are deprecated; dropped. TLSv1.3 is the fast path
    # (0-RTT handshake, modern ciphers). Browsers require 1.2+ anyway.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    include /var/www/html/.devcontainer/conf/nginx/magento.conf;
}
