[xdebug]

; Default mode is `debug` only. Xdebug's profile + coverage + develop modes
; each add measurable overhead (10-30% per mode). Enable others explicitly
; via the XDEBUG_MODE env var when you need them, e.g.:
;   XDEBUG_MODE=debug,profile bin/magento setup:upgrade
;
; The containerEnv in devcontainer.json sets XDEBUG_MODE=off by default,
; which overrides this INI. This value is the fallback for shells/processes
; that don't inherit that env var.
xdebug.mode=debug
xdebug.idekey=vscode
xdebug.start_with_request=yes
xdebug.log=/dev/stdout
xdebug.log_level=0
xdebug.client_port=9003
xdebug.client_host=localhost
