; OPcache + realpath tuning for Adobe Commerce / Magento 2.
;
; Dev-safe: validate_timestamps=1 with revalidate_freq=2 means PHP checks
; file mtimes every 2 seconds. Edit a .php file, reload the page — your
; change is in. Invisible to dev workflow; full speed for warm pages.
;
; To disable OPcache entirely (e.g. troubleshooting "why is my code change
; not picked up?"), set OPCACHE_ENABLE=0 in .devcontainer/.env and restart
; the container. commerce.sh writes an override INI that flips both
; opcache.enable and opcache.enable_cli to 0.
;
; Magento's own perf docs recommend these defaults:
;   https://experienceleague.adobe.com/docs/commerce-operations/configuration-guide/cli/manage-cache/manage-opcache.html

[opcache]
opcache.enable=1
opcache.enable_cli=1
; 768 MB — Magento compiles ~50k files in a warm tree; default 128 MB thrashes.
opcache.memory_consumption=768
opcache.interned_strings_buffer=32
; Magento has 50k+ PHP files; default 10k causes constant eviction.
opcache.max_accelerated_files=130000
; Magento uses PHP doc-comment annotations extensively — must keep comments.
opcache.save_comments=1
; Dev-friendly: re-check mtime every 2s so edits are picked up automatically.
; For prod, flip validate_timestamps=0 and flush OPcache manually on deploy.
opcache.validate_timestamps=1
opcache.revalidate_freq=2
; JIT is disabled here because Xdebug overrides zend_execute_ex(), which
; OPcache refuses to JIT over. With Xdebug always present in this dev
; container (even when XDEBUG_MODE=off the extension is loaded), JIT can
; never actually activate — and leaving jit=tracing triggers a noisy PHP
; warning on every CLI invocation. If you build a prod image without
; Xdebug, flip both back on for a modest compute speedup:
;   opcache.jit=tracing
;   opcache.jit_buffer_size=256M
opcache.jit=off
opcache.jit_buffer_size=0

[realpath]
; Magento's module depth makes stat() a measurable chunk of request time.
; Defaults (4 MB / 120 s) are too low; Adobe recommends 10 MB / 600 s.
realpath_cache_size=10M
realpath_cache_ttl=600
